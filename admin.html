<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайхан Говь | Захиалгын Удирдлага</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold: #D4A853;
      --gold-light: #F0C96B;
      --gold-dark: #A07830;
      --bg-deep: #0D0B08;
      --bg-dark: #141209;
      --bg-card: #1C1812;
      --bg-card-hover: #231F14;
      --text-primary: #F5EDD8;
      --text-secondary: #B8A880;
      --text-muted: #7A6E58;
      --border-gold: rgba(212, 168, 83, 0.25);
      --border-subtle: rgba(255,255,255,0.06);
      --accent-green: #5A8C5A;
      --accent-rose: #C0607A;
      --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      padding-bottom: 60px;
    }

    /* ===== LOGIN OVERLAY ===== */
    #loginOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-deep);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: var(--trans);
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: var(--gold);
    }

    .login-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-gold);
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      margin-bottom: 20px;
      text-align: center;
      transition: var(--trans);
    }

    .login-input:focus {
      border-color: var(--gold-light);
      box-shadow: 0 0 15px rgba(212,168,83,0.3);
    }

    .login-btn {
      width: 100%;
      background: var(--gold);
      color: var(--bg-deep);
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--trans);
    }

    .login-btn:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    .login-error {
      color: var(--accent-rose);
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
    }

    /* ===== MAIN LAYOUT ===== */
    .header {
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border-gold);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-logout {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--text-muted);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      transition: var(--trans);
    }

    .btn-logout:hover {
      color: var(--accent-rose);
      border-color: var(--accent-rose);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* ===== STATS DASHBOARD ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: var(--trans);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: var(--gold-light);
    }

    .stat-info h3 {
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-info p {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-icon {
      font-size: 2.5rem;
      opacity: 0.8;
    }

    /* ===== CONTROLS BAR ===== */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .search-box {
      position: relative;
      flex: 1;
      max-width: 400px;
      width: 100%;
    }

    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      color: #fff;
      padding: 12px 20px 12px 45px;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: var(--trans);
    }

    .search-input:focus {
      border-color: var(--gold-light);
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .filter-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-tab {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
      transition: var(--trans);
    }

    .filter-tab.active, .filter-tab:hover {
      background: var(--gold);
      color: var(--bg-deep);
      border-color: var(--gold);
    }

    /* ===== ORDERS LIST ===== */
    .orders-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
    }

    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: var(--trans);
      position: relative;
      overflow: hidden;
    }

    .order-card:hover {
      border-color: var(--gold-light);
      box-shadow: 0 10px 25px rgba(212,168,83,0.08);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 12px;
    }

    .order-code {
      font-weight: 700;
      color: var(--gold);
      font-size: 1.1rem;
    }

    .order-status-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .order-status-badge.new {
      background: rgba(212, 168, 83, 0.15);
      color: var(--gold);
      border: 1px solid var(--gold);
      animation: pulse 2s infinite;
    }

    .order-status-badge.delivered {
      background: rgba(90, 140, 90, 0.15);
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
    }

    .order-status-badge.canceled {
      background: rgba(192, 96, 122, 0.15);
      color: var(--accent-rose);
      border: 1px solid var(--accent-rose);
    }

    .order-time {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .customer-info h4 {
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    .customer-detail {
      font-size: 0.88rem;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .customer-detail span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phone-link {
      color: var(--gold-light);
      font-weight: 600;
    }

    .order-items-box {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 14px;
      font-size: 0.88rem;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .item-row:last-child {
      margin-bottom: 0;
    }

    .item-topping {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: -4px;
      margin-bottom: 6px;
    }

    .order-note {
      font-size: 0.82rem;
      color: var(--accent-rose);
      background: rgba(192, 96, 122, 0.08);
      border-left: 3px solid var(--accent-rose);
      padding: 8px 12px;
      border-radius: 0 8px 8px 0;
    }

    .order-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-subtle);
      padding-top: 14px;
      margin-top: auto;
    }

    .order-total-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-action {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: var(--trans);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-action.deliver {
      background: var(--accent-green);
      color: #fff;
    }

    .btn-action.deliver:hover {
      background: #4d7a4d;
    }

    .btn-action.cancel {
      background: transparent;
      border: 1px solid var(--text-muted);
      color: var(--text-secondary);
    }

    .btn-action.cancel:hover {
      border-color: var(--accent-rose);
      color: var(--accent-rose);
    }

    .btn-action.delete {
      flex: 0;
      background: transparent;
      border: 1px solid rgba(192, 96, 122, 0.3);
      color: var(--text-muted);
      padding: 10px 14px;
    }

    .btn-action.delete:hover {
      background: var(--accent-rose);
      color: #fff;
      border-color: var(--accent-rose);
    }

    .no-orders {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      background: var(--bg-card);
      border: 1px dashed var(--border-gold);
      border-radius: 20px;
      color: var(--text-secondary);
    }

    .no-orders-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(212, 168, 83, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(212, 168, 83, 0); }
      100% { box-shadow: 0 0 0 0 rgba(212, 168, 83, 0); }
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN SCREEN ===== -->
  <div id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">🐪</div>
      <h2 class="login-title">Сайхан Говь</h2>
      <input type="password" id="adminPassword" class="login-input" placeholder="Нэвтрэх нууц үг" onkeydown="if(event.key === 'Enter') handleLogin()" autofocus>
      <button class="login-btn" onclick="handleLogin()">Нэвтрэх</button>
      <p class="login-error" id="loginError">Уучлаарай, нууц үг буруу байна!</p>
    </div>
  </div>

  <!-- ===== ADMIN SAMBAR ===== -->
  <div id="adminPanel" style="display:none">
    <header class="header">
      <div class="header-logo">🐪 Сайхан Говь · <em>Удирдлага</em></div>
      <div class="header-actions">
        <button class="btn-logout" onclick="handleLogout()">Гарах</button>
      </div>
    </header>

    <main class="container">
      <!-- STATS -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-info">
            <h3>Нийт Борлуулалт</h3>
            <p id="statSales">₮0</p>
          </div>
          <div class="stat-icon">💰</div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <h3>Нийт Захиалга</h3>
            <p id="statTotal">0</p>
          </div>
          <div class="stat-icon">📦</div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <h3>Шинэ Захиалга</h3>
            <p id="statNew" style="color:var(--gold-light)">0</p>
          </div>
          <div class="stat-icon">✨</div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <h3>Хүргэсэн захиалга</h3>
            <p id="statDelivered" style="color:var(--accent-green)">0</p>
          </div>
          <div class="stat-icon">✅</div>
        </div>
      </section>

      <!-- CONTROLS -->
      <section class="controls-bar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="Нэр, утас, кодоор хайх..." oninput="filterOrders()">
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">Бүгд</button>
          <button class="filter-tab" onclick="setFilter('Шинэ', this)">Шинэ ✨</button>
          <button class="filter-tab" onclick="setFilter('Хүргэгдсэн', this)">Хүргэгдсэн ✅</button>
          <button class="filter-tab" onclick="setFilter('Цуцлагдсан', this)">Цуцлагдсан ❌</button>
        </div>
      </section>

      <!-- ORDERS GRID -->
      <section class="orders-list" id="ordersContainer">
        <div class="no-orders">
          <div class="no-orders-icon">⏳</div>
          <p>Мэдээллийн сантай холбогдож байна...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Firebase compatibility SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    // ===== FIREBASE CONFIGURATION =====
    const firebaseConfig = {
      apiKey: "AIzaSyB5yQxlMLUXN5xgoC6WlHmIKgp1c_XieR0",
      authDomain: "saikhan-gobi-fdbee.firebaseapp.com",
      projectId: "saikhan-gobi-fdbee",
      storageBucket: "saikhan-gobi-fdbee.firebasestorage.app",
      messagingSenderId: "650891488214",
      appId: "1:650891488214:web:dcade5f5b3a0074f99d277",
      measurementId: "G-MLMLV7X1Q7"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Local Variables
    let rawOrders = [];
    let currentFilter = 'all';
    let loadedOrderIds = new Set();
    let initialLoadComplete = false;

    // Password setup (default Admin password)
    const ADMIN_PASSWORD = "Govizairmag2026";

    // Check login state
    window.onload = () => {
      if (localStorage.getItem("adminLoggedIn") === "true") {
        showAdminPanel();
      }
    };

    function handleLogin() {
      const pin = document.getElementById("adminPassword").value;
      const errorEl = document.getElementById("loginError");
      if (pin === ADMIN_PASSWORD) {
        localStorage.setItem("adminLoggedIn", "true");
        showAdminPanel();
      } else {
        errorEl.style.display = "block";
      }
    }

    function handleLogout() {
      localStorage.removeItem("adminLoggedIn");
      document.getElementById("loginOverlay").style.display = "flex";
      document.getElementById("adminPanel").style.display = "none";
    }

    function showAdminPanel() {
      document.getElementById("loginOverlay").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
      startRealtimeListener();
    }

    // Audio chime on new order
    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.type = 'sine';
        // Play ascending notes (C5 -> E5 -> G5 -> C6)
        osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(659.25, ctx.currentTime + 0.12);
        osc.frequency.exponentialRampToValueAtTime(783.99, ctx.currentTime + 0.24);
        osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.36);
        
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } catch (e) {
        console.error("Audio failed:", e);
      }
    }

    // Realtime Listener
    function startRealtimeListener() {
      db.collection('orders')
        .orderBy('timestamp', 'desc')
        .onSnapshot(snapshot => {
          rawOrders = [];
          let newOrderFound = false;

          snapshot.forEach(doc => {
            const data = doc.data();
            data.id = doc.id;
            rawOrders.push(data);

            // Play sound only if it's a brand new order document ID during runtime
            if (initialLoadComplete && !loadedOrderIds.has(doc.id) && data.status === 'Шинэ') {
              newOrderFound = true;
            }
            loadedOrderIds.add(doc.id);
          });

          if (newOrderFound) {
            playChime();
          }

          initialLoadComplete = true;
          updateDashboard();
        }, error => {
          console.error("Firestore error:", error);
          document.getElementById('ordersContainer').innerHTML = `
            <div class="no-orders" style="color:var(--accent-rose)">
              <div class="no-orders-icon">❌</div>
              <p>Мэдээллийн сантай холбогдоход алдаа гарлаа.</p>
              <p style="font-size:0.8rem; margin-top:8px">${error.message}</p>
            </div>
          `;
        });
    }

    // Status Updates
    async function updateOrderStatus(docId, newStatus) {
      try {
        await db.collection('orders').doc(docId).update({
          status: newStatus
        });
      } catch (e) {
        alert("Төлөв шинэчлэхэд алдаа гарлаа: " + e.message);
      }
    }

    async function deleteOrder(docId) {
      if (confirm("Энэ захиалгыг бүрмөсөн устгах уу? Сэргээх боломжгүй.")) {
        try {
          await db.collection('orders').doc(docId).delete();
        } catch (e) {
          alert("Устгахад алдаа гарлаа: " + e.message);
        }
      }
    }

    // Dashboard calculations
    function updateDashboard() {
      // Sales: sum of Delivered orders total
      const totalSales = rawOrders
        .filter(o => o.status === 'Хүргэгдсэн')
        .reduce((sum, o) => sum + (o.total || 0), 0);
      
      const totalOrders = rawOrders.length;
      const newOrders = rawOrders.filter(o => o.status === 'Шинэ').length;
      const deliveredOrders = rawOrders.filter(o => o.status === 'Хүргэгдсэн').length;

      document.getElementById('statSales').textContent = `₮${totalSales.toLocaleString()}`;
      document.getElementById('statTotal').textContent = totalOrders;
      document.getElementById('statNew').textContent = newOrders;
      document.getElementById('statDelivered').textContent = deliveredOrders;

      filterOrders();
    }

    // Filter & Search Logic
    function setFilter(filterType, element) {
      currentFilter = filterType;
      document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
      element.classList.add('active');
      filterOrders();
    }

    function filterOrders() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('ordersContainer');

      let filtered = rawOrders;

      // Filter by Tab Status
      if (currentFilter !== 'all') {
        filtered = filtered.filter(o => o.status === currentFilter);
      }

      // Filter by Search Query
      if (q) {
        filtered = filtered.filter(o => 
          o.name?.toLowerCase().includes(q) ||
          o.phone?.toLowerCase().includes(q) ||
          o.code?.toLowerCase().includes(q) ||
          o.address?.toLowerCase().includes(q)
        );
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="no-orders">
            <div class="no-orders-icon">🍦</div>
            <p>Захиалга олдсонгүй.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(o => {
        // Date formatting
        let dateStr = "Тодорхойгүй";
        if (o.timestamp) {
          const d = o.timestamp.toDate ? o.timestamp.toDate() : new Date(o.timestamp);
          dateStr = d.toLocaleString('mn-MN');
        }

        const noteMarkup = (o.note && o.note !== 'Байхгүй') ? `<div class="order-note">📝 Тэмдэглэл: ${o.note}</div>` : '';
        const orderTypeLabel = o.orderType === 'wholesale' ? '📦 Бөөний' : '🛒 Жижиглэн';

        // Items HTML
        let itemsHtml = '';
        if (o.items) {
          if (o.items.q1 > 0 || (o.items.vanillaCup && o.items.vanillaCup.qty > 0)) {
            const qty = o.items.q1 || o.items.vanillaCup.qty;
            const topping = o.items.vanillaCup?.topping ? o.items.vanillaCup.topping : 'none';
            itemsHtml += `
              <div class="item-row"><span>Ингэний аяга</span><span>${qty}ш</span></div>
              <div class="item-topping">Сүмс: ${topping !== 'none' ? topping : 'Үгүй'}</div>
            `;
          }
          if (o.items.q2 > 0 || (o.items.coneIcecream && o.items.coneIcecream.qty > 0)) {
            const qty = o.items.q2 || o.items.coneIcecream.qty;
            const topping = o.items.coneIcecream?.topping ? o.items.coneIcecream.topping : 'none';
            itemsHtml += `
              <div class="item-row"><span>Конус зайрмаг</span><span>${qty}ш</span></div>
              <div class="item-topping">Сүмс: ${topping !== 'none' ? topping : 'Үгүй'}</div>
            `;
          }
        } else if (o.itemsText) {
          itemsHtml = `<div style="white-space: pre-line">${o.itemsText}</div>`;
        }

        // Action Buttons according to status
        let buttonsHtml = '';
        if (o.status === 'Шинэ') {
          buttonsHtml = `
            <button class="btn-action deliver" onclick="updateOrderStatus('${o.id}', 'Хүргэгдсэн')">✓ Хүргэсэн</button>
            <button class="btn-action cancel" onclick="updateOrderStatus('${o.id}', 'Цуцлагдсан')">✕ Цуцлах</button>
          `;
        } else if (o.status === 'Хүргэгдсэн') {
          buttonsHtml = `
            <button class="btn-action cancel" onclick="updateOrderStatus('${o.id}', 'Цуцлагдсан')">✕ Цуцлах</button>
          `;
        } else if (o.status === 'Цуцлагдсан') {
          buttonsHtml = `
            <button class="btn-action deliver" onclick="updateOrderStatus('${o.id}', 'Хүргэгдсэн')">✓ Хүргэсэн</button>
          `;
        }

        // Status class for UI
        let statusClass = 'new';
        if (o.status === 'Хүргэгдсэн') statusClass = 'delivered';
        if (o.status === 'Цуцлагдсан') statusClass = 'canceled';

        return `
          <div class="order-card">
            <div class="order-header">
              <span class="order-code">${o.code || 'БГ-ХОЦ'}</span>
              <span class="order-status-badge ${statusClass}">${o.status}</span>
            </div>
            <div class="order-time">🕑 ${dateStr} · <strong>${orderTypeLabel}</strong></div>
            <div class="customer-info">
              <h4>👤 ${o.name || 'Тодорхойгүй нэр'}</h4>
              <div class="customer-detail">
                <span>📞 Утас: <a href="tel:${o.phone}" class="phone-link">${o.phone || 'Утасгүй'}</a></span>
                <span>📍 Хаяг: ${o.address || 'Хаяггүй'}</span>
                <span>💳 Төлбөр: ${o.payment === 'cash' ? '💵 Бэлнээр' : '📱 ' + o.payment.toUpperCase()}</span>
              </div>
            </div>
            <div class="order-items-box">
              ${itemsHtml}
            </div>
            ${noteMarkup}
            <div class="order-total-row">
              <span>Хүргэлттэй нийт:</span>
              <span class="order-total-price">₮${(o.total || 0).toLocaleString()}</span>
            </div>
            <div class="order-actions">
              ${buttonsHtml}
              <button class="btn-action delete" title="Устгах" onclick="deleteOrder('${o.id}')">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
